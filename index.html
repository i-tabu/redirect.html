<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="row">
      <div class="col text-center">

        <!-- Spinner -->
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Loading...</span>
        </div>

        <!-- Text -->
        <h4 class="mt-4" id="redirect-text">Redirecting...</h4>
        <p class="text-muted">Please wait, you will be redirected shortly.</p>

      </div>
    </div>
  </div>

  <script>
    // ==== CONFIG ====
    const REDIRECT_URL = "https://example.com"; // change this
    const DELAY_MS = 1000; // change delay (ms)

    // Update text
    document.getElementById("redirect-text").innerText =
      "Redirecting to " + REDIRECT_URL.replace(/^https?:\/\//, "") + "...";

    // Redirect after delay
    setTimeout(() => {
      window.location.href = REDIRECT_URL;
    }, DELAY_MS);
  </script>
</body>
</html>
